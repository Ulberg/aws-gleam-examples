name = "fargate_smoke_test"
version = "0.1.0"
target = "erlang"

description = "End-to-end Fargate smoke test for the aws-gleam SDK. Two roles in one OTP release (writer + reader) exercise S3 PutObject / GetObject, SQS SendMessage / ReceiveMessage, and the credentials chain against a real AWS account. Deployed via OpenTofu in ./infra/."

# Path deps to the sibling aws-gleam checkout while the SDK is
# pre-publish. Once `aws_runtime` / `aws_s3` / `aws_sqs` are on
# hex.pm, swap each path dep for a version constraint:
#
#   aws_runtime = ">= 0.1.0"
#   aws_s3      = ">= 0.1.0"
#   aws_sqs     = ">= 0.1.0"
#
# The handler source doesn't change — same `aws/services/s3`
# and `aws/services/sqs` module imports either way.
[dependencies]
gleam_stdlib = ">= 0.40.0 and < 2.0.0"
gleam_erlang = ">= 1.0.0 and < 2.0.0"
gleam_otp = ">= 1.0.0 and < 2.0.0"
gleam_http = ">= 4.0.0 and < 5.0.0"
gleam_httpc = ">= 5.0.0 and < 6.0.0"
gleam_json = ">= 2.0.0 and < 4.0.0"
gleam_aws_runtime = { path = "../../aws-gleam/runtime" }
gleam_aws_s3 = { path = "../../aws-gleam/services/s3" }
gleam_aws_sqs = { path = "../../aws-gleam/services/sqs" }

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
