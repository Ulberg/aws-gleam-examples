name = "aws_gleam_smoke"
version = "0.1.0"
target = "erlang"

description = "Real-world Lambda smoke test for the aws-gleam SDK. Deployed via OpenTofu in ./infra/. Exercises S3 put/get/list/multipart against a real AWS bucket from inside a Lambda function so the SDK's credential chain, endpoint resolution, and HTTP transport see the live AWS API."

[dependencies]
gleam_stdlib = ">= 0.40.0 and < 2.0.0"
gleam_erlang = ">= 1.0.0 and < 2.0.0"
gleam_otp = ">= 1.0.0 and < 2.0.0"
gleam_http = ">= 4.0.0 and < 5.0.0"
gleam_httpc = ">= 5.0.0 and < 6.0.0"
gleam_json = ">= 2.0.0 and < 4.0.0"
# Path dependency to the SDK in this repo — see docs/smoke-test-plan.md
# for the "path vs Hex pre-release" decision. Once the SDK ships a
# 0.2.0-rc.1 to Hex, swap to `aws = ">= 0.2.0-rc.1"`.
aws = { path = "../" }

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
