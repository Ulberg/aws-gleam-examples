name = "aws_gleam_smoke"
version = "0.1.0"
target = "erlang"

description = "End-to-end Fargate smoke test for the aws-gleam SDK. Deployed via OpenTofu in ./infra/. Exercises S3 put + get + SQS send + receive against a real AWS bucket and queue from inside two container roles (writer / reader)."

[dependencies]
gleam_stdlib = ">= 0.40.0 and < 2.0.0"
gleam_erlang = ">= 1.0.0 and < 2.0.0"
gleam_otp = ">= 1.0.0 and < 2.0.0"
gleam_http = ">= 4.0.0 and < 5.0.0"
gleam_httpc = ">= 5.0.0 and < 6.0.0"
gleam_json = ">= 2.0.0 and < 4.0.0"
# Path dependency to the in-tree SDK. Once the SDK ships to Hex,
# flip this to `aws = ">= 0.2.0"` to consume the published package
# instead — the rest of the example doesn't change.
aws = { path = "../../" }

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
