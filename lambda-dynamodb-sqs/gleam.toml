name = "lambda_dynamodb_sqs"
version = "0.1.0"
target = "erlang"

description = "SQS-triggered Lambda that lands each message into a DynamoDB table. End-to-end example of running aws-gleam SDK on Lambda via container image deploy. Glambda-inspired typed event + Handler API, but Erlang-target instead of JavaScript."

[dependencies]
gleam_stdlib = ">= 0.40.0 and < 2.0.0"
gleam_erlang = ">= 1.0.0 and < 2.0.0"
gleam_otp = ">= 1.0.0 and < 2.0.0"
gleam_http = ">= 4.0.0 and < 5.0.0"
gleam_httpc = ">= 5.0.0 and < 6.0.0"
gleam_json = ">= 2.0.0 and < 4.0.0"

# Pinned to the SDK's 1.x line. Patch + minor releases (1.0.1,
# 1.1.0, ...) auto-resolve; 2.0.0 is treated as breaking and
# requires an explicit bump. The SDK releases under one tag so
# every aws_gleam_* moves in lock-step. To rebuild against a
# sibling aws-gleam/ checkout during SDK iteration, swap each
# line to `aws_gleam_<x> = { path = "../../aws-gleam/<x-path>" }`.
aws_gleam_runtime = ">= 1.1.0 and < 2.0.0"
aws_gleam_dynamodb = ">= 1.1.0 and < 2.0.0"
aws_gleam_sqs = ">= 1.1.0 and < 2.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
