name = "fargate_s3"
version = "0.1.0"
target = "erlang"

description = "End-to-end S3 + SQS round-trip on Fargate for the aws-gleam SDK. Two roles in one OTP release (writer + reader) exercise S3 PutObject / GetObject, SQS SendMessage / ReceiveMessage, and the credentials chain against a real AWS account. Deployed via OpenTofu in ./infra/."

# Pinned to the SDK's 1.x line. Patch + minor releases (1.0.1,
# 1.1.0, ...) auto-resolve; 2.0.0 is treated as breaking and won't
# be picked up without an explicit bump here. SDK packages move
# in lock-step under one tag, so the same constraint works on
# every aws_gleam_* dep.
#
# To rebuild against a sibling aws-gleam checkout (SDK iteration),
# swap each line to
#   aws_gleam_<x> = { path = "../../aws-gleam/<x-path>" }
[dependencies]
gleam_stdlib = ">= 0.40.0 and < 2.0.0"
gleam_erlang = ">= 1.0.0 and < 2.0.0"
gleam_otp = ">= 1.0.0 and < 2.0.0"
gleam_http = ">= 4.0.0 and < 5.0.0"
gleam_httpc = ">= 5.0.0 and < 6.0.0"
gleam_json = ">= 2.0.0 and < 4.0.0"
aws_gleam_runtime = ">= 1.1.0 and < 2.0.0"
aws_gleam_s3 = ">= 1.1.0 and < 2.0.0"
aws_gleam_sqs = ">= 1.1.0 and < 2.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
